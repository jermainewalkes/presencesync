name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the need or the friction you are hitting, not just the solution.
      placeholder: When I go into a huddle I would also like...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working. Rough ideas are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you weighed.
  - type: dropdown
    id: platform
    attributes:
      label: Which platform is this for?
      options:
        - Both
        - macOS
        - Windows
    validations:
      required: true
